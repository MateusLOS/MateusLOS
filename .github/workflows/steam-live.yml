name: Steam Live Update

on:
  schedule:
    - cron: "0 * * * *"   # roda toda hora
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  update-steam:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar script Steam
        run: python update_steam.py

      - name: Commit e push se houve mudança
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: atualiza Steam Live [skip ci]"
          git push
